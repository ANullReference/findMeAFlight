version: "1.0"

models:
  default: "claude-sonnet-4-20250514"
  fast: "claude-haiku-4-5-20251001"

prompts:
  system: |
    You are a flight deal hunting agent. When the user asks for flights, you MUST 
    immediately call the search_flights tool — do not ask clarifying questions first. 
    Make reasonable assumptions for any missing parameters (e.g. default currency to CAD, 
    search multiple destination airports if the user says a country instead of a code).
    Return your final answer as a JSON object with a "best_deals" array. 
    When a user specifies a country, search all major airports in that country sequentially.
    
  response_shape: |
    {
      "best_deals": [
        {
          "flightNumber": "",
          "airline": "",
          "price": 0,
          "stops": 0,
          "departureTime": "",
          "arrivalTime": "",
          "from_airport": "",
          "return_date": "",
          "to_airport": "",
          "flight_number": "",
          "reasoning": ""
        }
      ],
      "summary": "overall recommendation"
    }

tools:
  - name: "search_flights"
    description: "Search for flights between two airports on a given date."
  # - name: "save_deal"
  #   description: "Save a flight deal to the local database."
